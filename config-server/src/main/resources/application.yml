server:
  port: 8888

spring:
  application:
    name: config-server
  autoconfigure:
    exclude:
      - org.springframework.cloud.gateway.config.GatewayClassPathWarningAutoConfiguration
      - org.springframework.cloud.gateway.config.GatewayAutoConfiguration
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config

  security:
    user:
      name: ${CONFIG_SERVER_USERNAME:finpay-config}
      password: ${CONFIG_SERVER_PASSWORD:finpay-secret-2024}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info